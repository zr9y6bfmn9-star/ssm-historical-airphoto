name: Bootstrap bridge package v2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unpack bridge package
        run: |
          set -euo pipefail
          test -f SSM_historical_airphoto_bridge_v1.0.zip
          rm -rf _stage
          unzip -q SSM_historical_airphoto_bridge_v1.0.zip -d _stage
          rsync -a --exclude='.github/' _stage/SSM_airphoto_bridge_v1.0/ ./
          rm -rf _stage SSM_historical_airphoto_bridge_v1.0.zip

      - name: Commit installed package
        run: |
          git config user.name "ssm-airphoto-bot"
          git config user.email "ssm-airphoto-bot@users.noreply.github.com"
          git add -A
          git commit -m "bootstrap: install SSM airphoto bridge" || echo "No changes"
          git push
