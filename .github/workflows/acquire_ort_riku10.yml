name: Acquire historical airphoto batch

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID"
        required: true
        default: "SSM-T01A"
        type: string
      grid_ids:
        description: "One or two comma-separated cells"
        required: true
        default: "SSM-B001-G01,SSM-B001-G04"
        type: string
      max_new_tiles:
        description: "Network cap, 1-24"
        required: true
        default: "18"
        type: string
      force_redownload:
        description: "Re-fetch existing valid tiles"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ssm-historical-airphoto-acquisition
  cancel-in-progress: false

jobs:
  acquire:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Acquire source tiles and build complete mosaics
        env:
          RUN_ID: ${{ inputs.run_id }}
          GRID_IDS: ${{ inputs.grid_ids }}
          MAX_NEW_TILES: ${{ inputs.max_new_tiles }}
          FORCE_REDOWNLOAD: ${{ inputs.force_redownload }}
        run: |
          FLAGS=""
          if [ "$FORCE_REDOWNLOAD" = "true" ]; then FLAGS="--force-redownload"; fi
          python scripts/acquire_ort_riku10.py \
            --run-id "$RUN_ID" \
            --grid-ids "$GRID_IDS" \
            --max-new-tiles "$MAX_NEW_TILES" \
            $FLAGS

      - name: Commit generated assets and ledgers
        run: |
          git config user.name "ssm-airphoto-bot"
          git config user.email "ssm-airphoto-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "data: ${{ inputs.run_id }} historical-airphoto acquisition"
            git push
          fi
